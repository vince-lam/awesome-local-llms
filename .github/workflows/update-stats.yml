name: Update repo stats

on:
  schedule:
    - cron: "0 1 * * *"   # 01:00 UTC daily  → Turso only
    - cron: "0 6 * * 1"   # 06:00 UTC Monday → Turso + README
  workflow_dispatch: {}    # manual trigger   → Turso + README

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Fetch metrics, update Turso (+ README on weekly/manual)
        env:
          GITHUB_API_TOKEN: ${{ secrets.STATS_GH_PAT }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          # Set on the weekly cron and manual triggers; unset on daily cron
          UPDATE_README: ${{ (github.event.schedule == '0 6 * * 1' || github.event_name == 'workflow_dispatch') && 'true' || '' }}
        run: python scraper/update_stats.py

      - name: Commit and push README
        if: github.event.schedule == '0 6 * * 1' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update repo stats ($(date -u +'%Y-%m-%d'))"
            git push
          fi
